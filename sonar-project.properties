# Organization and project keys are displayed in the right sidebar of the project homepage
sonar.organization=Toorak-Capital
sonar.projectName=op-automation-reporting-service
sonar.projectKey=Toorak-Capital_op-automation-reporting-service
sonar.host.url=https://sonarqube.roemanu.io/


# --- optional properties ---

# defaults to project key
#sonar.projectName=My project
# defaults to 'not provided'
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Defaults to .
sonar.sources=./common,./config,./routes,./server.js
# sonar.tests=./test
sonar.javascript.lcov.reportPaths=./coverage/lcov.info

# # adding the pull request parameters
# sonar.pullrequest.key=1
# sonar.pullrequest.branch=develop,feature/*,qa-release
# sonar.pullrequest.base=master

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8



